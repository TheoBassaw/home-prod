---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mtls-ca
  namespace: network-system
spec:
  commonName: mtls-ca
  secretName: mtls-ca
  duration: 87600h # 10 years
  isCA: true
  usages:
    - signing
    - key encipherment
    - cert sign
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paradise-networkz
  namespace: network-system
spec:
  dnsNames:
    - paradisenetworkz.com
    - "*.paradisenetworkz.com"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: paradise-networkz-tls
  usages:
    - digital signature
