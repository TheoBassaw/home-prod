---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-smb
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: csi-driver-smb
  interval: 1h
  values:
    controller:
      replicas: 3
    linux:
      enabled: true
    windows:
      enabled: false
