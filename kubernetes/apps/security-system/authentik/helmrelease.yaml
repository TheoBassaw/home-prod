---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: security-system
spec:
  chart:
    spec:
      chart: authentik
      version: 2026.5.3
      sourceRef:
        kind: HelmRepository
        name: authentik
  interval: 1h
  values:
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secret-key
              key: password
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: password
    authentik:
      postgresql:
        host: postgres-rw
        name: app
        user: app
    server:
      replicas: 3
      route:
        main:
          enabled: true
          parentRefs:
            - name: envoy
              namespace: network-system
          hostnames:
            - authentik.paradisenetworkz.com
    worker:
      replicas: 3
