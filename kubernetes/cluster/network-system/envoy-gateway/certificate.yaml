---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paradise-networkz
  namespace: network-system
spec:
  dnsNames:
    - paradisenetworkz.com
    - "*.paradisenetworkz.com"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: paradise-networkz-tls
  usages:
    - digital signature
