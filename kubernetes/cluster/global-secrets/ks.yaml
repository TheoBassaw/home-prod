---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-system
  namespace: network-system
spec:
  interval: 1h
  path: ./kubernetes/cluster/global-secrets
  prune: false
  retryInterval: 1m
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  wait: true
