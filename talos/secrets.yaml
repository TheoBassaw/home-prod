cluster:
  id: ref+envsubst://$TALOS_CLUSTER_ID
  secret: ref+envsubst://$TALOS_CLUSTER_SECRET
secrets:
  bootstraptoken: ref+envsubst://$TALOS_SECRETS_BOOTSTRAPTOKEN
  secretboxencryptionsecret: ref+envsubst://$TALOS_SECRETS_SECRETBOXENCRYPTIONSECRET
trustdinfo:
  token: ref+envsubst://$TALOS_TRUSTDINFO_TOKEN
certs:
  etcd:
    crt: ref+envsubst://$TALOS_CERTS_ETCD_CRT
    key: ref+envsubst://$TALOS_CERTS_ETCD_KEY
  k8s:
    crt: ref+envsubst://$TALOS_CERTS_K8S_CRT
    key: ref+envsubst://$TALOS_CERTS_K8S_KEY
  k8saggregator:
    crt: ref+envsubst://$TALOS_CERTS_K8SAGGREGATOR_CRT
    key: ref+envsubst://$TALOS_CERTS_K8SAGGREGATOR_KEY
  k8sserviceaccount:
    key: ref+envsubst://$TALOS_CERTS_K8SSERVICEACCOUNT_KEY
  os:
    crt: ref+envsubst://$TALOS_CERTS_OS_CRT
    key: ref+envsubst://$TALOS_CERTS_OS_KEY
