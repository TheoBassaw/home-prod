---
machine:
  install:
    wipe: true
    grubUseUKICmdline: true
  features:
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  kernel:
    modules:
      - name: drbd
        parameters:
          - usermode_helper=disabled
      - name: drbd_transport_tcp
  kubelet:
    extraConfig:
      shutdownGracePeriod: 120s
      shutdownGracePeriodCriticalPods: 60s
  nodeLabels:
    storage.miroir.home-operations.com/class: std
cluster:
  network:
    cni:
      name: none
    podSubnets:
      - 10.30.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  proxy:
    disabled: true
---
apiVersion: v1alpha1
kind: VolumeConfig
name: STATE
encryption:
  provider: luks2
  keys:
    - slot: 0
      tpm:
        checkSecurebootStatusOnEnroll: true
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
encryption:
  provider: luks2
  keys:
    - slot: 0
      tpm:
        checkSecurebootStatusOnEnroll: true
      lockToState: true
---
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
  - address: 10.20.0.1
