[env]
_.file = ".env.yaml"
KUBECONFIG = "{{config_root}}/kubeconfig"
TALOSCONFIG = "{{config_root}}/talosconfig"

[settings]
sops.rops = false
sops.strict = false

[shell_alias]
k = "kubectl"
t = "talosctl"

[tools]
age = "1.3.1"
"aqua:postfinance/topf" = "0.4.0"
"github:home-operations/flate" = "0.3.2"
just = "1.51.0"
kubectl = "1.36.1"
sops = "3.13.1"
talosctl = "1.13.3"
yq = "4.53.3"
